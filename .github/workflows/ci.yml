name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/pelada_rank
      JWT_SECRET: ci-jwt-secret-at-least-32-characters
      ADMIN_ALLOWLIST_USERNAMES: ""
      ALLOW_FIRST_ADMIN_BOOTSTRAP: "false"
      ALLOW_CLOSE_WITH_INCOMPLETE_RATINGS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

